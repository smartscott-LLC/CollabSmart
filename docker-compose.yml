services:
  postgres:
    image: postgres:16-alpine
    container_name: collabsmart-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-collabsmart}
      - POSTGRES_USER=${POSTGRES_USER:-collabsmart}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-collabsmart}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
      - ./backend/db/lina_schema.sql:/docker-entrypoint-initdb.d/01-lina-schema.sql:ro
    ports:
      - "5432:5432"
    networks:
      - collabsmart
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          PGPASSWORD=${POSTGRES_PASSWORD:-collabsmart}
          psql -U ${POSTGRES_USER:-collabsmart} -d ${POSTGRES_DB:-collabsmart}
          -c 'SELECT 1' -q --no-psqlrc > /dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: collabsmart-dragonfly
    command: dragonfly --logtostderr --requirepass ${DRAGONFLY_PASSWORD:-collabsmart} --maxmemory ${DRAGONFLY_MAX_MEMORY:-2gb}
    environment:
      - DRAGONFLY_PASSWORD=${DRAGONFLY_PASSWORD:-collabsmart}
    ulimits:
      memlock: -1
    volumes:
      - dragonfly_data:/data
    ports:
      - "6379:6379"
    networks:
      - collabsmart
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          redis-cli --no-auth-warning -a "$DRAGONFLY_PASSWORD" ping | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 5

  desktop:
    build:
      context: ./container
      dockerfile: Dockerfile
    container_name: collabsmart-desktop
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - DISPLAY=:1
      - VNC_PASSWORD=${VNC_PASSWORD:-collabsmart}
    volumes:
      - workspace:/workspace
      - ./container/configs:/configs:ro
    ports:
      - "6080:6080"
    networks:
      - collabsmart
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6080"]
      interval: 10s
      timeout: 5s
      retries: 5

  lina:
    build:
      context: ./backend/lina
      dockerfile: Dockerfile
    container_name: collabsmart-lina
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-collabsmart}:${POSTGRES_PASSWORD:-collabsmart}@postgres:5432/${POSTGRES_DB:-collabsmart}
      - REDIS_URL=redis://:${DRAGONFLY_PASSWORD:-collabsmart}@dragonfly:6379
      - LINA_MODEL=${LINA_MODEL:-claude-haiku-4-5-20251001}
      - LINA_MAX_TOKENS=${LINA_MAX_TOKENS:-4096}
      - LINA_LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"
    networks:
      - collabsmart
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/lina/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collabsmart-backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - DESKTOP_HOST=desktop
      - DESKTOP_VNC_PORT=5901
      - WORKSPACE_PATH=/workspace
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-collabsmart}
      - POSTGRES_USER=${POSTGRES_USER:-collabsmart}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-collabsmart}
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
      - DRAGONFLY_PASSWORD=${DRAGONFLY_PASSWORD:-collabsmart}
      - DRAGONFLY_DB=${DRAGONFLY_DB:-0}
      - AI_MODEL=${AI_MODEL:-claude-haiku-4-5-20251001}
      - AI_MAX_TOKENS=${AI_MAX_TOKENS:-4096}
      - ONET_API_BASE=${ONET_API_BASE:-https://services.onetcenter.org/ws}
      - ONET_USERNAME=${ONET_USERNAME:-}
      - ONET_PASSWORD=${ONET_PASSWORD:-}
      - MEMORY_PROMOTION_THRESHOLD=${MEMORY_PROMOTION_THRESHOLD:-5.0}
      - WORKING_MEMORY_TTL_HOURS=${WORKING_MEMORY_TTL_HOURS:-48}
      - SESSION_RECORDING_ENABLED=${SESSION_RECORDING_ENABLED:-false}
      - SESSION_TIMEOUT_MINUTES=${SESSION_TIMEOUT_MINUTES:-90}
      - MAX_CONVERSATION_HISTORY=${MAX_CONVERSATION_HISTORY:-100}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LINA_SERVICE_URL=http://lina:8001
    volumes:
      - workspace:/workspace
    ports:
      - "3001:3001"
    networks:
      - collabsmart
    depends_on:
      desktop:
        condition: service_healthy
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      lina:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collabsmart-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:3001}
      - NEXT_PUBLIC_NOVNC_URL=${NEXT_PUBLIC_NOVNC_URL:-http://localhost:6080}
    ports:
      - "3000:3000"
    networks:
      - collabsmart
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  workspace:
    driver: local
  postgres_data:
    driver: local
  dragonfly_data:
    driver: local

networks:
  collabsmart:
    driver: bridge
