services:
  postgres:
    image: postgres:16-alpine
    container_name: collabsmart-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-collabsmart}
      - POSTGRES_USER=${POSTGRES_USER:-collabsmart}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-collabsmart}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - collabsmart
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collabsmart} -d ${POSTGRES_DB:-collabsmart}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: collabsmart-dragonfly
    command: --logtostderr
    ulimits:
      memlock: -1
    volumes:
      - dragonfly_data:/data
    ports:
      - "6379:6379"
    networks:
      - collabsmart
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  desktop:
    build:
      context: ./container
      dockerfile: Dockerfile
    container_name: collabsmart-desktop
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - DISPLAY=:1
    volumes:
      - workspace:/workspace
      - ./container/configs:/configs:ro
    ports:
      - "6080:6080"
    networks:
      - collabsmart
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6080"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collabsmart-backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DESKTOP_HOST=desktop
      - DESKTOP_VNC_PORT=5901
      - WORKSPACE_PATH=/workspace
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-collabsmart}
      - POSTGRES_USER=${POSTGRES_USER:-collabsmart}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-collabsmart}
      - DRAGONFLY_HOST=dragonfly
      - DRAGONFLY_PORT=6379
      - ONET_API_BASE=${ONET_API_BASE:-https://services.onetcenter.org/ws}
      - ONET_USERNAME=${ONET_USERNAME:-}
      - ONET_PASSWORD=${ONET_PASSWORD:-}
    volumes:
      - workspace:/workspace
    ports:
      - "3001:3001"
    networks:
      - collabsmart
    depends_on:
      desktop:
        condition: service_healthy
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collabsmart-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:3001
      - NEXT_PUBLIC_NOVNC_URL=http://localhost:6080
    ports:
      - "3000:3000"
    networks:
      - collabsmart
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  workspace:
    driver: local
  postgres_data:
    driver: local
  dragonfly_data:
    driver: local

networks:
  collabsmart:
    driver: bridge
