# Cloud Build configuration for the LLM Personality Engine
# Builds and pushes to Artifact Registry

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/the LLMandsmartsku/the LLM-personality:${SHORT_SHA}'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/the LLMandsmartsku/the LLM-personality:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    dir: 'src/the LLM_personality'

  # Push the image with commit SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/the LLMandsmartsku/the LLM-personality:${SHORT_SHA}'

  # Push the image with latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/the LLMandsmartsku/the LLM-personality:latest'

# Images to store in Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/the LLMandsmartsku/the LLM-personality:${SHORT_SHA}'
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/the LLMandsmartsku/the LLM-personality:latest'

# Build configuration
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Timeout (default is 10 minutes)
timeout: '1200s'

tags:
  - 'the LLM-personality'
  - 'harmony'
  - 'ai-services'
